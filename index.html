<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg" />

    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/style.css">

    <script src="./js/script.js" defer></script>

</head>

<body onload="open_album()">

    <header>
        <div>
            <img src="./assets/icons/fotogram_logo.svg" alt="Fotogram Logo">
        </div>
    </header>

    <main>

        <h1>Your personal photo album</h1>

        <section id="photo_index" class="preview_section">

        </section>

        <dialog id="chosen_photo_dialog" class="full_view_dialog" onmousedown="event.target==this && close_dialog()">

            <div class="full_view_top">
                <h2 id="chosen_photo_name">Platzhalter für den Namen des Photos</h2>
                <button onclick="close_dialog()" id="close_dialog">❌</button>
            </div>

            <img src="" alt="" id="chosen_photo" class="chosen_photo">

            <nav class="full_view_nav">

                <button id="previous_photo" onclick="previous_photo()"><img src="
                    ./assets/icons/previous_page_button.svg" alt="previous Button"></button>

                <p class="page_indicator" id="photo_number">x/xx</p>

                <button id="next_photo" onclick="next_photo()"><img src="./assets/icons/next_page_button.svg"
                        alt="next Page"></button>

            </nav>

        </dialog>

    </main>

    <footer>
        <img src="./assets/icons/developer_akademie_logo.svg" alt="DA Logo">
        <p>© 2023 Developer Akademie GmbH</p>
    </footer>

</body>

</html>
